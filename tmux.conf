set -g default-terminal "screen-256color"
set -g default-command "reattach-to-user-namespace -l zsh"

set -g status on
set -g status-interval 2
set -g status-left-length 20
set -g status-bg black
set -g status-fg white
set -g status-right-length 150
set -g window-status-format "#[default] #I #[fg=colour244]#[default]#W "
set -g window-status-current-format "#[fg=colour234,bg=colour31]#[fg=colour117,bg=colour31] #I #[fg=colour231,bold]#W #[fg=colour31,bg=colour244,nobold]"

bind y run-shell "reattach-to-user-namespace -l zsh -c 'tmux show-buffer | pbcopy'"

set -s escape-time 30

set -g mouse on

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

setw -g mode-keys vi

bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
